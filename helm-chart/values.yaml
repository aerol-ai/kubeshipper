# ---------------------------------------------------------------------------
# Replica count
# MUST be 1 when using SQLite storage. SQLite does not support concurrent
# multi-process writes. Running 2+ replicas causes split-brain state.
# To scale horizontally, migrate the state store to PostgreSQL.
# ---------------------------------------------------------------------------
replicaCount: 1

image:
  repository: ghcr.io/aerol-ai/kubeshipper
  pullPolicy: Always
  # Overrides the image tag. Set to a specific git SHA in CI/CD via --set image.tag=$GITHUB_SHA
  tag: "latest"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  # Set a custom name. Defaults to the release fullname.
  name: ""

# ---------------------------------------------------------------------------
# Authentication
# ---------------------------------------------------------------------------
auth:
  # Bearer token required on all /services routes.
  # Leave empty ("") to run in open/dev mode (no auth).
  # Clients must send:  Authorization: Bearer <token>
  token: ""

  # Supply an existing Kubernetes Secret instead of creating one.
  # The secret must have the key "auth-token".
  # When set, auth.token is ignored.
  existingSecret: ""

# ---------------------------------------------------------------------------
# Storage — SQLite PersistentVolumeClaim
# ---------------------------------------------------------------------------
storage:
  size: 1Gi
  # Set to a StorageClass name to use a specific provisioner.
  # Leave empty to use the cluster default StorageClass.
  storageClass: ""
  mountPath: /data

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
rbac:
  # clusterWide controls /services RBAC.
  #   clusterWide: true  → ClusterRole + ClusterRoleBinding
  #                         kubeshipper can deploy to ANY namespace.
  #   clusterWide: false → Role + RoleBinding per namespace
  #                         kubeshipper can only deploy to namespaces listed
  #                         in managedNamespaces below. Recommended for prod.
  clusterWide: true

  # List every namespace kubeshipper is allowed to manage workloads in.
  # Drives the MANAGED_NAMESPACES env var in all modes; also drives per-namespace
  # Role+RoleBinding creation when clusterWide is false.
  # Use ["*"] to allow ALL namespaces (requires clusterWide: true). The service
  # account will list namespaces dynamically from the API at runtime.
  managedNamespaces:
    - default

  # helmAdmin controls /charts RBAC.
  #   helmAdmin: false → /charts will fail to install charts that contain
  #                       CRDs, cluster-scoped resources, or multi-namespace
  #                       resources (which is most non-trivial charts).
  #   helmAdmin: true  → binds the service account to cluster-admin so
  #                       /charts can install arbitrary Helm charts.
  # Set to true only if you trust everyone with /charts API access — the
  # API key effectively grants cluster-admin via Helm chart contents.
  helmAdmin: false

# ---------------------------------------------------------------------------
# Managed namespace — where kubeshipper deploys workloads by default
# Deprecated in favour of rbac.managedNamespaces; kept for backwards compat.
# The MANAGED_NAMESPACES env var is now derived from rbac.managedNamespaces.
# ---------------------------------------------------------------------------
# managedNamespace is no longer used directly; see rbac.managedNamespaces below

# ---------------------------------------------------------------------------
# Service (the Kubernetes Service for kubeshipper's own HTTP API)
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 3000

# ---------------------------------------------------------------------------
# Ingress — expose kubeshipper outside the cluster
# ---------------------------------------------------------------------------
# Pluggable: pick a provider matching the ingress controller already running
# in your cluster. The chart does NOT install or check for the controller —
# you assert it exists by setting `provider`. DNS for `host` must resolve
# to the controller's external IP/hostname before TLS via ACME will work.
#
# Currently supported providers: traefik
# Planned:                       nginx, caddy
# ---------------------------------------------------------------------------
ingress:
  # Master switch. When false, no ingress resources are rendered.
  enabled: false

  # Which ingress controller to target. Required when enabled.
  # Supported: "traefik". Anything else fails at install time.
  provider: ""

  # Public hostname clients will use, e.g. "shipper.example.com".
  # REQUIRED when enabled. The chart will not invent one for you.
  host: ""

  # TLS configuration shared across providers.
  tls:
    # Default on. To expose plain HTTP (not recommended), set to false.
    enabled: true
    # Bring-your-own TLS secret (must contain tls.crt / tls.key for `host`).
    # If empty, you must set a provider-specific cert mechanism below
    # (e.g. traefik.certResolver) so the controller can provision a cert.
    secretName: ""

  # Safety rail: refuse to render an ingress when no auth token is set.
  # Override only if you know what you're doing — exposing the API
  # without auth grants workload-deploy (and possibly cluster-admin) to
  # anyone who can reach `host`.
  allowUnauthenticated: false

  # -------------------------------------------------------------------------
  # Traefik-specific options. Only read when provider == "traefik".
  # -------------------------------------------------------------------------
  traefik:
    # "IngressRoute" → Traefik-native CRD (more features: middlewares,
    #                   certResolver, raw router options).
    # "Ingress"      → standard networking.k8s.io/v1 Ingress (portable;
    #                   Traefik picks it up via ingressClassName).
    kind: IngressRoute

    # IngressRoute only — Traefik entrypoints to bind the route to.
    entryPoints:
      - websecure

    # Ingress only — ingressClassName field on the Ingress object.
    ingressClassName: traefik

    # IngressRoute only — name of a Traefik certResolver configured in
    # your Traefik static config (e.g. "letsencrypt"). When set, Traefik
    # provisions a cert for `host` via ACME. Requires DNS to resolve first.
    # Mutually informative with tls.secretName: set ONE of them.
    certResolver: ""

    # IngressRoute only — references to existing Traefik Middleware CRDs
    # (rate-limit, IP allowlist, basic-auth, etc.). The chart does not
    # create middlewares — you create them separately and reference here.
    # Each entry: { name: <middleware-name>, namespace: <ns> }
    middlewares: []

    # Extra annotations applied to the rendered ingress resource.
    annotations: {}

    # Raw passthrough for advanced IngressRoute router fields you need
    # but the chart doesn't surface explicitly (e.g. priority, custom
    # match rule). Merged into the route object.
    routerOptions: {}

# ---------------------------------------------------------------------------
# Resource requests and limits for the kubeshipper pod
# ---------------------------------------------------------------------------
resources: {}
# requests:
#   cpu: 50m
#   memory: 128Mi
# limits:
#   cpu: 200m
#   memory: 256Mi

podAnnotations: {}
nodeSelector: {}
tolerations: []
affinity: {}
