{{- if and .Values.auth.token (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "kubeshipper.fullname" . }}-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kubeshipper.labels" . | nindent 4 }}
type: Opaque
stringData:
  auth-token: {{ .Values.auth.token | quote }}
{{- end }}
