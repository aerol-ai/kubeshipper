suite: deployment
templates:
  - templates/deployment.yaml

tests:
  - it: renders a Deployment with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubeshipper
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/aerol-ai/kubeshipper:latest"
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always

  - it: sets the correct container port
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3000
      - equal:
          path: spec.template.spec.containers[0].ports[0].name
          value: http

  - it: sets required env vars
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PORT
            value: "3000"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DB_PATH
            value: /data/kubeshipper.sqlite
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MANAGED_NAMESPACES
            value: "default"

  - it: does NOT inject AUTH_TOKEN when auth is not configured
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTH_TOKEN

  - it: injects AUTH_TOKEN from auto-created secret when auth.token is set
    set:
      auth.token: supersecret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-kubeshipper-auth
                key: auth-token
                optional: true

  - it: injects AUTH_TOKEN from existing secret when auth.existingSecret is set
    set:
      auth.existingSecret: my-existing-secret
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: AUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: my-existing-secret
                key: auth-token
                optional: true

  - it: applies security context
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true
      - equal:
          path: spec.template.spec.securityContext.runAsUser
          value: 1000
      - equal:
          path: spec.template.spec.securityContext.fsGroup
          value: 1000

  - it: mounts the data volume at the configured mountPath
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-kubeshipper-data

  - it: uses a custom storage mountPath
    set:
      storage.mountPath: /mnt/storage
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /mnt/storage

  - it: configures liveness and readiness probes
    asserts:
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.httpGet.port
          value: http
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.path
          value: /health
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.httpGet.port
          value: http

  - it: applies resource requests and limits when set
    set:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    asserts:
      - equal:
          path: spec.template.spec.containers[0].resources.requests.cpu
          value: 50m
      - equal:
          path: spec.template.spec.containers[0].resources.limits.memory
          value: 256Mi

  - it: applies podAnnotations when set
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: applies nodeSelector when set
    set:
      nodeSelector:
        disktype: ssd
    asserts:
      - equal:
          path: spec.template.spec.nodeSelector.disktype
          value: ssd

  - it: applies tolerations when set
    set:
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "infra"
          effect: "NoSchedule"
    asserts:
      - contains:
          path: spec.template.spec.tolerations
          content:
            key: "dedicated"
            operator: "Equal"
            value: "infra"
            effect: "NoSchedule"

  - it: respects fullnameOverride
    set:
      fullnameOverride: my-shipper
    asserts:
      - equal:
          path: metadata.name
          value: my-shipper


  - it: uses managedNamespaces joined as comma-separated string
    set:
      rbac.managedNamespaces:
        - staging
        - production
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MANAGED_NAMESPACES
            value: "staging,production"

  - it: overrides image tag
    set:
      image.tag: "abc123"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "ghcr.io/aerol-ai/kubeshipper:abc123"
