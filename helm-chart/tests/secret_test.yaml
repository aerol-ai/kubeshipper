suite: secret
templates:
  - templates/secret.yaml

tests:
  - it: renders no Secret when auth.token is empty (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: renders no Secret when only existingSecret is provided (no token)
    set:
      auth.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: creates a Secret when auth.token is set
    set:
      auth.token: my-secret-token
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubeshipper-auth
      - equal:
          path: type
          value: Opaque
      - equal:
          path: stringData["auth-token"]
          value: my-secret-token

  - it: does not create a Secret when both token and existingSecret are set
    set:
      auth.token: ignored-token
      auth.existingSecret: my-existing-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: includes standard labels on the Secret
    set:
      auth.token: some-token
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: kubeshipper

  - it: respects fullnameOverride in Secret name
    set:
      auth.token: my-token
      fullnameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app-auth
