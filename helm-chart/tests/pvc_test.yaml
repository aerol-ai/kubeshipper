suite: pvc
templates:
  - templates/pvc.yaml

tests:
  - it: renders a PVC with default values
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubeshipper-data
      - equal:
          path: spec.accessModes[0]
          value: ReadWriteOnce
      - equal:
          path: spec.resources.requests.storage
          value: 1Gi

  - it: does not set storageClassName when not configured
    asserts:
      - isNull:
          path: spec.storageClassName

  - it: sets storageClassName when configured
    set:
      storage.storageClass: fast-ssd
    asserts:
      - equal:
          path: spec.storageClassName
          value: fast-ssd

  - it: uses a custom storage size
    set:
      storage.size: 10Gi
    asserts:
      - equal:
          path: spec.resources.requests.storage
          value: 10Gi

  - it: includes standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: kubeshipper

  - it: respects fullnameOverride in PVC name
    set:
      fullnameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app-data
