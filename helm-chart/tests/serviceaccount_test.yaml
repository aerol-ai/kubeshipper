suite: serviceaccount
templates:
  - templates/serviceaccount.yaml

tests:
  - it: creates a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.name
          value: RELEASE-NAME-kubeshipper

  - it: does not create a ServiceAccount when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: uses a custom name when serviceAccount.name is set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: respects fullnameOverride for the default SA name
    set:
      fullnameOverride: my-app
    asserts:
      - equal:
          path: metadata.name
          value: my-app

  - it: includes standard labels
    asserts:
      - isNotEmpty:
          path: metadata.labels["helm.sh/chart"]
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: kubeshipper
