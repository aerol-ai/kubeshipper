apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeshipper
  namespace: default
---
# /charts deploys arbitrary Helm charts which can include cluster-scoped resources
# (ClusterIssuer, ClusterRole, CRDs), multiple namespaces, and Traefik / cert-manager
# CRDs. The /services API only needs the narrower role above.
# This binding gives KubeShipper near-cluster-admin authority — required for the
# Helm functionality. Document this clearly in your security model.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeshipper
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: kubeshipper
    namespace: default
