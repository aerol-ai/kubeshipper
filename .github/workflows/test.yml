name: Test

on:
  push:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "web/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches:
      - main
    paths:
      - "**.go"
      - "go.mod"
      - "go.sum"
      - "web/**"
      - ".github/workflows/test.yml"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.15

      - name: Install dashboard dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build dashboard assets
        working-directory: web
        run: bun run build

      - name: Run tests
        run: go test -race -count=1 ./internal/...
