name: Helm Chart Tests

on:
  push:
    branches:
      - main
    paths:
      - "helm-chart/**"
  pull_request:
    branches:
      - main
    paths:
      - "helm-chart/**"

jobs:
  helm-unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Install helm-unittest plugin
        run: |
          PLUGIN_VERSION="1.0.3"
          OS="linux"
          ARCH="amd64"
          URL="https://github.com/helm-unittest/helm-unittest/releases/download/v${PLUGIN_VERSION}/helm-unittest-${OS}-${ARCH}-${PLUGIN_VERSION}.tgz"
          curl -sSL "$URL" -o /tmp/helm-unittest.tgz
          PLUGIN_DIR="${HELM_PLUGINS:-$HOME/.local/share/helm/plugins}/helm-unittest"
          mkdir -p "$PLUGIN_DIR/bin"
          tar -xzf /tmp/helm-unittest.tgz -C /tmp
          cp /tmp/untt "$PLUGIN_DIR/"
          cp /tmp/plugin.yaml "$PLUGIN_DIR/"
          chmod +x "$PLUGIN_DIR/untt"

      - name: Run Helm unit tests
        run: helm unittest helm-chart/
