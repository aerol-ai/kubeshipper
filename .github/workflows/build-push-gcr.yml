name: Build and Push to GHCR

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/kubeshipper

jobs:
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # required to push to ghcr.io

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # No external secrets needed — GITHUB_TOKEN is automatically available
      # and has write access to packages in this repository's owner account.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            # short git SHA on every push
            type=sha,prefix=,format=short
            # branch name (e.g. main)
            type=ref,event=branch
            # semver from tag (e.g. v1.2.3 → 1.2.3)
            type=semver,pattern={{version}}
            # latest only on default branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps rebuilds fast
          cache-from: type=gha
          cache-to: type=gha,mode=max
